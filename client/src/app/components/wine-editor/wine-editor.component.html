<div class="animate-slide-up max-w-lg mx-auto px-4 py-6">

  <!-- ── Header ────────────────────────────────────────────── -->
  <div class="flex items-center gap-3 mb-6">
    <button
      (click)="goBack()"
      class="w-10 h-10 rounded-full glass flex items-center justify-center text-cream
             transition-colors hover:bg-white/10"
      aria-label="Tilbake"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
      </svg>
    </button>
    <h1 class="font-serif text-2xl text-cream font-semibold">Legg til vin</h1>
  </div>

  <!-- ── Image Preview ─────────────────────────────────────── -->
  @if (imageUrl()) {
    <div class="mb-6 rounded-2xl overflow-hidden">
      <img
        [src]="imageUrl()"
        alt="Skannet etikett"
        class="w-full h-48 object-cover"
      />
    </div>
  }

  <!-- ── Form ──────────────────────────────────────────────── -->
  <div class="glass rounded-2xl p-5 space-y-5">

    <!-- Name -->
    <div>
      <label for="wine-name" class="block text-xs uppercase tracking-wider text-cream-dark mb-1.5 font-medium">
        Navn *
      </label>
      <input
        id="wine-name"
        type="text"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        placeholder="f.eks. Barolo Riserva"
        class="w-full min-h-12 px-4 rounded-xl bg-white/5 text-cream placeholder-cream-dark/40
               border border-white/10 focus:border-burgundy-light focus:ring-1 focus:ring-burgundy-light
               transition-colors outline-none"
      />
    </div>

    <!-- Producer -->
    <div>
      <label for="wine-producer" class="block text-xs uppercase tracking-wider text-cream-dark mb-1.5 font-medium">
        Produsent *
      </label>
      <input
        id="wine-producer"
        type="text"
        [ngModel]="producer()"
        (ngModelChange)="producer.set($event)"
        placeholder="f.eks. Marchesi di Barolo"
        class="w-full min-h-12 px-4 rounded-xl bg-white/5 text-cream placeholder-cream-dark/40
               border border-white/10 focus:border-burgundy-light focus:ring-1 focus:ring-burgundy-light
               transition-colors outline-none"
      />
    </div>

    <!-- Vintage + Type (side by side) -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="wine-vintage" class="block text-xs uppercase tracking-wider text-cream-dark mb-1.5 font-medium">
          Årgang
        </label>
        <input
          id="wine-vintage"
          type="number"
          [ngModel]="vintage()"
          (ngModelChange)="vintage.set($event)"
          placeholder="2020"
          min="1900"
          max="2030"
          class="w-full min-h-12 px-4 rounded-xl bg-white/5 text-cream placeholder-cream-dark/40
                 border border-white/10 focus:border-burgundy-light focus:ring-1 focus:ring-burgundy-light
                 transition-colors outline-none"
        />
      </div>
      <div>
        <label for="wine-type" class="block text-xs uppercase tracking-wider text-cream-dark mb-1.5 font-medium">
          Type
        </label>
        <select
          id="wine-type"
          [ngModel]="type()"
          (ngModelChange)="type.set($event)"
          class="w-full min-h-12 px-4 rounded-xl bg-white/5 text-cream
                 border border-white/10 focus:border-burgundy-light focus:ring-1 focus:ring-burgundy-light
                 transition-colors outline-none appearance-none"
        >
          @for (t of wineTypes; track t) {
            <option [value]="t" class="bg-cellar-surface text-cream">{{ t }}</option>
          }
        </select>
      </div>
    </div>

    <!-- Country + Region (side by side) -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="wine-country" class="block text-xs uppercase tracking-wider text-cream-dark mb-1.5 font-medium">
          Land
        </label>
        <input
          id="wine-country"
          type="text"
          [ngModel]="country()"
          (ngModelChange)="country.set($event)"
          placeholder="f.eks. Italia"
          class="w-full min-h-12 px-4 rounded-xl bg-white/5 text-cream placeholder-cream-dark/40
                 border border-white/10 focus:border-burgundy-light focus:ring-1 focus:ring-burgundy-light
                 transition-colors outline-none"
        />
      </div>
      <div>
        <label for="wine-region" class="block text-xs uppercase tracking-wider text-cream-dark mb-1.5 font-medium">
          Region
        </label>
        <input
          id="wine-region"
          type="text"
          [ngModel]="region()"
          (ngModelChange)="region.set($event)"
          placeholder="f.eks. Piemonte"
          class="w-full min-h-12 px-4 rounded-xl bg-white/5 text-cream placeholder-cream-dark/40
                 border border-white/10 focus:border-burgundy-light focus:ring-1 focus:ring-burgundy-light
                 transition-colors outline-none"
        />
      </div>
    </div>

    <!-- Grape Variety + Alcohol (side by side) -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="wine-grape" class="block text-xs uppercase tracking-wider text-cream-dark mb-1.5 font-medium">
          Drue
        </label>
        <input
          id="wine-grape"
          type="text"
          [ngModel]="grapeVariety()"
          (ngModelChange)="grapeVariety.set($event)"
          placeholder="f.eks. Nebbiolo"
          class="w-full min-h-12 px-4 rounded-xl bg-white/5 text-cream placeholder-cream-dark/40
                 border border-white/10 focus:border-burgundy-light focus:ring-1 focus:ring-burgundy-light
                 transition-colors outline-none"
        />
      </div>
      <div>
        <label for="wine-alcohol" class="block text-xs uppercase tracking-wider text-cream-dark mb-1.5 font-medium">
          Alkohol
        </label>
        <input
          id="wine-alcohol"
          type="text"
          [ngModel]="alcoholContent()"
          (ngModelChange)="alcoholContent.set($event)"
          placeholder="f.eks. 14%"
          class="w-full min-h-12 px-4 rounded-xl bg-white/5 text-cream placeholder-cream-dark/40
                 border border-white/10 focus:border-burgundy-light focus:ring-1 focus:ring-burgundy-light
                 transition-colors outline-none"
        />
      </div>
    </div>

    <!-- Rating -->
    <div>
      <label class="block text-xs uppercase tracking-wider text-cream-dark mb-2 font-medium">
        Vurdering
      </label>
      <app-star-rating [(rating)]="rating" />
    </div>

    <!-- Notes -->
    <div>
      <label for="wine-notes" class="block text-xs uppercase tracking-wider text-cream-dark mb-1.5 font-medium">
        Notater
      </label>
      <textarea
        id="wine-notes"
        [ngModel]="notes()"
        (ngModelChange)="notes.set($event)"
        rows="3"
        placeholder="Smaksnotater, lukt, anledning..."
        class="w-full px-4 py-3 rounded-xl bg-white/5 text-cream placeholder-cream-dark/40
               border border-white/10 focus:border-burgundy-light focus:ring-1 focus:ring-burgundy-light
               transition-colors outline-none resize-none"
      ></textarea>
    </div>

    <!-- Error -->
    @if (wineService.error()) {
      <div class="rounded-xl px-4 py-3 text-sm text-red-400 bg-red-500/10 border border-red-500/20" role="alert">
        {{ wineService.error() }}
      </div>
    }

    <!-- Save button -->
    <button
      (click)="save()"
      [disabled]="saving() || !name() || !producer()"
      class="w-full py-4 rounded-2xl bg-burgundy text-cream text-lg font-semibold
             shadow-lg shadow-burgundy/25 border border-gold/20
             transition-all duration-200 active:scale-[0.98] hover:bg-burgundy-light
             disabled:opacity-40 disabled:cursor-not-allowed"
    >
      @if (saving()) {
        <span class="flex items-center justify-center gap-2">
          <span class="w-5 h-5 rounded-full border-2 border-cream/30 border-t-cream animate-spin"></span>
          Lagrer...
        </span>
      } @else {
        <span class="flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
          </svg>
          Lagre vin
        </span>
      }
    </button>
  </div>

</div>
