<div class="fixed top-0 left-0 right-0 z-[100] flex flex-col items-center gap-2 px-4 pointer-events-none"
     style="padding-top: calc(0.75rem + var(--sat))">
  @for (toast of notifications.toasts(); track toast.id) {
    <div
      class="pointer-events-auto w-full max-w-sm rounded-xl border backdrop-blur-lg px-4 py-3
             flex items-start gap-3 shadow-lg animate-slide-up"
      [class]="getTypeClasses(toast.type)"
      role="alert"
    >
      <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="getIconPath(toast.type)" />
      </svg>
      <p class="text-sm flex-1 leading-relaxed">{{ toast.message }}</p>
      <button
        (click)="notifications.dismiss(toast.id)"
        class="flex-shrink-0 opacity-60 hover:opacity-100 transition-opacity"
        aria-label="Lukk"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>
