<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

  <!-- Drop zone / preview area -->
  <label
    for="wine-image-input"
    class="relative flex items-center justify-center w-full h-48 cursor-pointer
           border-2 border-dashed border-gray-200 rounded-2xl
           hover:border-red-400 hover:bg-red-50 transition-all duration-200"
    [class.border-solid]="previewUrl()"
    [class.border-gray-200]="!previewUrl()"
    [class.p-0]="previewUrl()"
  >
    @if (previewUrl()) {
      <img
        [src]="previewUrl()"
        alt="Etikett forhåndsvisning"
        class="w-full h-full object-cover"
      />
      <!-- Clear button overlay -->
      <button
        type="button"
        (click)="clearPreview(); $event.preventDefault()"
        class="absolute top-2 right-2 bg-black/50 text-white rounded-full w-7 h-7
               flex items-center justify-center text-sm hover:bg-black/70 transition-colors"
        aria-label="Fjern bilde"
      >
        ✕
      </button>
    } @else {
      <div class="flex flex-col items-center gap-2 text-gray-400 px-4 text-center select-none">
        <!-- Camera icon -->
        <svg
          class="w-12 h-12 opacity-60"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175
               C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25
               2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865
               47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192
               2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0
               00-1.736 1.039l-.821 1.316z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z"
          />
        </svg>

        <span class="font-medium text-sm">Ta bilde av etiketten</span>
        <span class="text-xs">eller trykk for å velge fra bildebibliotek</span>
      </div>
    }
  </label>

  <!--
    File input:
    - accept="image/*"  → image picker on mobile
    - capture="environment" → prefer back camera for label scanning
  -->
  <input
    id="wine-image-input"
    type="file"
    accept="image/*"
    capture="environment"
    class="sr-only"
    (change)="onFileSelected($event)"
  />

  <!-- Upload progress -->
  @if (uploading()) {
    <div class="flex items-center gap-3 px-4 py-3 border-t border-gray-100 text-sm text-gray-500">
      <span
        class="inline-block w-4 h-4 rounded-full border-2 border-red-700 border-t-transparent animate-spin"
        aria-hidden="true"
      ></span>
      Laster opp til sky-lagring…
    </div>
  }

  <!-- Upload error -->
  @if (uploadError()) {
    <div class="px-4 py-3 border-t border-red-100 bg-red-50 text-sm text-red-600 rounded-b-2xl">
      {{ uploadError() }}
    </div>
  }

</div>
