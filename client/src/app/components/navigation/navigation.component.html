<nav
  class="fixed bottom-0 left-0 right-0 z-50 glass-strong"
  style="padding-bottom: var(--sab)"
  aria-label="Hovednavigasjon"
>
  <div class="flex items-center justify-around max-w-lg mx-auto h-16 px-4">

    <!-- Hjem -->
    <a
      routerLink="/"
      routerLinkActive="text-gold"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex flex-col items-center gap-1 text-cream-dark transition-colors duration-200 hover:text-cream min-w-[60px]"
      aria-label="Hjem"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"

      </svg>
      <span class="text-[10px] font-medium">Hjem</span>
    </a>

    <!-- Skann (large center button) -->
    <a
      routerLink="/scan"
      class="flex flex-col items-center -mt-6"
      aria-label="Skann etikett"
    >
      <div
        class="w-14 h-14 rounded-full bg-burgundy flex items-center justify-center shadow-lg shadow-burgundy/30
               transition-all duration-200 active:scale-95 hover:bg-burgundy-light"
      >
        <svg class="w-7 h-7 text-cream" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round"

          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z" />
        </svg>
      </div>
      <span class="text-[10px] font-medium text-cream-dark mt-1">Skann</span>
    </a>

    <!-- Kjeller -->
    <a
      routerLink="/cellar"
      routerLinkActive="text-gold"
      class="flex flex-col items-center gap-1 text-cream-dark transition-colors duration-200 hover:text-cream min-w-[60px]"
      aria-label="Vinkjeller"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
