<!-- Backdrop -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4 pb-20 bg-black/70 backdrop-blur-sm animate-fade-in"
  (click)="close()"
>
  <!-- Modal -->
  <div
    class="w-full max-w-md max-h-[85vh] overflow-y-auto rounded-3xl glass border border-white/10
           animate-slide-up flex flex-col"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="flex items-center justify-between px-5 pt-5 pb-3">
      <h3 class="font-serif text-lg text-cream font-semibold">Forhåndsvisning</h3>
      <button
        (click)="close()"
        class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-cream-dark hover:bg-white/10 transition-colors"
        aria-label="Lukk"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Scaled preview of the share card -->
    <div class="px-5 pb-4 flex justify-center overflow-hidden">
      <div class="w-full" style="max-width: 280px;">
        <div class="relative w-full" style="padding-bottom: 130%;">
          <div
            class="absolute inset-0 origin-top-left"
            style="transform: scale(0.7);"
          >
            <div #shareCard style="width: 400px; height: 520px;">
              <app-wine-share-card [wine]="wine()" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="px-5 pb-5 pt-2 flex gap-3" style="padding-bottom: max(1.25rem, env(safe-area-inset-bottom))">
      <button
        (click)="close()"
        class="flex-1 py-3 rounded-xl glass text-cream font-medium hover:bg-white/10 transition-colors"
      >
        Avbryt
      </button>
      <button
        (click)="share()"
        [disabled]="isSharing()"
        class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl bg-burgundy text-cream font-medium
               hover:bg-burgundy-light transition-colors disabled:opacity-40"
      >
        @if (isSharing()) {
          <span class="w-4 h-4 rounded-full border-2 border-cream/30 border-t-cream animate-spin"></span>
          Deler...
        } @else {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.933-2.185 2.25 2.25 0 0 0-3.933 2.185Z" />
          </svg>
          Del
        }
      </button>
    </div>
  </div>
</div>
