# ── VinLoggen – local dev stack ───────────────────────────────────────────────
# Start everything:   docker compose up --build
# Stop:               docker compose down
# Rebuild API only:   docker compose up --build api
#
# Requires a .env file in this directory (already gitignored).
# Minimum required variables:
#   SUPABASE_CONNECTION_STRING=postgresql://postgres:[PW]@db.[REF].supabase.co:5432/postgres
#   GEMINI_API_KEY=...
#
# Optional:
#   CORS_ALLOWED_ORIGINS=https://vinloggen.no   (extra origins beyond *.vercel.app)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── .NET 10 Web API (Kestrel) ─────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "5000:8080"       # http://localhost:5000/api/wines
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: "8080"
      SUPABASE_CONNECTION_STRING: ${SUPABASE_CONNECTION_STRING:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Angular 21 dev server ─────────────────────────────────────────────────
  client:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./client:/app
      # Named volume keeps node_modules inside the container (avoids host/container ABI mismatch)
      - client_node_modules:/app/node_modules
    ports:
      - "4200:4200"       # http://localhost:4200
    environment:
      NODE_ENV: development
    # Proxies /api/* → http://api:8080 via proxy.conf.docker.json
    command: >
      sh -c "npm install && npm run start:docker"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  client_node_modules:
