<div class="space-y-3">

  <!-- Location Type Chips -->
  @if (!hideTypeSelector()) {
  <div class="flex gap-2 flex-wrap">
    @for (lt of locationTypes; track lt.value) {
      <button
        type="button"
        (click)="onTypeChange(lt.value)"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border transition-all duration-200"
        [class]="locationType() === lt.value
          ? 'bg-burgundy text-cream border-burgundy-light'
          : 'bg-white/5 text-cream-dark border-white/10 hover:bg-white/10'"
      >
        <span>{{ lt.icon }}</span>
        {{ lt.label }}
      </button>
    }
  </div>
  }

  <!-- Quick Actions -->
  <div class="flex gap-2">
    @if (permission() !== 'denied') {
      <button
        type="button"
        (click)="useCurrentLocation()"
        [disabled]="locating()"
        class="flex items-center gap-1.5 px-3 py-2 rounded-xl glass text-cream text-xs font-medium
               transition-all duration-200 active:scale-[0.98] hover:bg-white/10
               disabled:opacity-50"
      >
        @if (locating()) {
          <span class="w-3.5 h-3.5 rounded-full border-2 border-cream/30 border-t-cream animate-spin"></span>
        } @else {
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
          </svg>
        }
        Nåværende posisjon
      </button>
    }

    @if (homeAddress()) {
      <button
        type="button"
        (click)="useHomeAddress()"
        class="flex items-center gap-1.5 px-3 py-2 rounded-xl glass text-cream text-xs font-medium
               transition-all duration-200 active:scale-[0.98] hover:bg-white/10"
      >
        <span>🏠</span>
        Hjemme
      </button>
    }
  </div>

  <!-- Search Input -->
  <div class="relative">
    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-cream-dark/50" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
    </svg>
    <input
      type="text"
      [ngModel]="query()"
      (ngModelChange)="onQueryChange($event)"
      placeholder="Søk etter sted..."
      class="w-full min-h-10 pl-9 pr-4 rounded-xl bg-white/5 text-cream text-sm placeholder-cream-dark/40
             border border-white/10 focus:border-burgundy-light focus:ring-1 focus:ring-burgundy-light
             transition-colors outline-none"
    />
    @if (searching()) {
      <span class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 rounded-full border-2 border-cream/30 border-t-cream animate-spin"></span>
    }
  </div>

  <!-- Results Dropdown -->
  @if (results().length > 0) {
    <ul class="glass rounded-xl overflow-hidden divide-y divide-white/5" role="listbox">
      @for (place of results(); track place.address) {
        <li>
          <button
            type="button"
            (click)="selectPlace(place)"
            class="w-full px-4 py-3 text-left hover:bg-white/5 transition-colors flex items-start gap-3"
            role="option"
          >
            <svg class="w-4 h-4 text-burgundy-light mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
            </svg>
            <div class="min-w-0">
              <p class="text-sm text-cream font-medium truncate">{{ place.name }}</p>
              <p class="text-xs text-cream-dark truncate">{{ place.address }}</p>
            </div>
          </button>
        </li>
      }
    </ul>
  }

</div>
