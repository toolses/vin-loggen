<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e0010"/>
      <stop offset="100%" stop-color="#0c0007"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Gold border -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#D4AF37" stroke-width="6" opacity="0.35"/>

  <!-- VS letters -->
  <text
    x="256"
    y="343"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="248"
    font-weight="bold"
    fill="#D4AF37"
    text-anchor="middle"
    letter-spacing="-8"
  >VS</text>
</svg>
